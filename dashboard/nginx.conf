server {
    listen 3001;
    root /usr/share/nginx/html;
    index index.html;

    # --- Security headers (production) -----------------------------
    # Strict CSP lives here (not in index.html) so Vite dev still works.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' ws: wss:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none';" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-XSS-Protection "1; mode=block" always;
    server_tokens off;

    # Hashed assets → long cache
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/chaos/ {
        proxy_pass http://chaos-engine.skam-platform:8090/;
    }

    location /api/anomaly/ {
        proxy_pass http://anomaly-detector.skam-platform:8091/;
    }

    location /api/healing/ {
        proxy_pass http://decision-engine.skam-platform:8092/;
    }

    location /ws/ {
        proxy_pass http://decision-engine.skam-platform:8092/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }
}
