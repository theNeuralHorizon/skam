apiVersion: v1
kind: Namespace
metadata:
  name: skam-platform
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: skam-platform-sa
  namespace: skam-platform
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: skam-chaos-operator
rules:
  # Pod management (chaos injection + healing)
  - apiGroups: [""]
    resources: ["pods", "pods/exec", "pods/log"]
    verbs: ["get", "list", "watch", "create", "delete", "patch"]
  # Deployment management (scaling, restarts)
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets"]
    verbs: ["get", "list", "watch", "patch", "update"]
  # HPA management (auto-scaling)
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "watch", "patch", "update", "create"]
  # Network policies (network partition injection/removal)
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "watch", "create", "delete", "patch"]
  # Services (traffic rerouting)
  - apiGroups: [""]
    resources: ["services", "endpoints"]
    verbs: ["get", "list", "watch", "patch"]
  # Events (monitoring)
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch"]
  # Nodes (resource pressure monitoring)
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
  # ConfigMaps/Secrets (configuration)
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: skam-chaos-operator-binding
subjects:
  - kind: ServiceAccount
    name: skam-platform-sa
    namespace: skam-platform
roleRef:
  kind: ClusterRole
  name: skam-chaos-operator
  apiGroup: rbac.authorization.k8s.io
