apiVersion: apps/v1
kind: Deployment
metadata:
  name: chaos-engine
  namespace: skam-platform
  labels:
    app: chaos-engine
    component: platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chaos-engine
  template:
    metadata:
      labels:
        app: chaos-engine
        component: platform
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: skam-platform-sa
      containers:
        - name: chaos-engine
          image: skam/chaos-engine:latest
          ports:
            - containerPort: 8090
              name: http
              protocol: TCP
          env:
            - name: LOG_LEVEL
              value: "info"
          livenessProbe:
            httpGet:
              path: /health
              port: 8090
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8090
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: chaos-engine
  namespace: skam-platform
  labels:
    app: chaos-engine
    component: platform
spec:
  type: NodePort
  selector:
    app: chaos-engine
  ports:
    - port: 8090
      targetPort: 8090
      nodePort: 30090
      protocol: TCP
      name: http
