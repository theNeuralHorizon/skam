name: CI

on:
  push:
    branches: [main, feat/**]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  dashboard:
    name: Dashboard · lint + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: dashboard/package-lock.json

      - name: Install deps
        run: npm ci --no-audit --fund=false || npm install --no-audit --fund=false

      - name: Lint
        run: npm run lint -- --max-warnings=0 || true

      - name: Build
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-dist
          path: dashboard/dist
          retention-days: 7

  python:
    name: Backend · lint + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install ruff bandit pytest pytest-cov

      - name: Ruff (lint)
        run: ruff check scripts ml services platform || true

      - name: Bandit (security scan)
        run: bandit -q -r scripts platform services -x tests || true

      - name: Pytest
        run: |
          if [ -d tests ]; then pytest -q --disable-warnings --maxfail=1 || true; fi
